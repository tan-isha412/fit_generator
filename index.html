<!DOCTYPE html>
<html lang="en">
    <head>
        <title>FIT GENERATOR</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <script src="app.js" defer></script>
    </head>
    <body>
        <h1>I'VE NOTHING TO WEAR!!</h1>
        <div id="main-container">
            <button id="randm">Randomize!</button>
            <div id="accessories">
                <p class="category-label">Accessories</p>
                <img class="addonimg" src="" alt="add-ons">
                <div id="next0btn">
                <button id="left0">&#10229;</button>
                <button id="right0">&#10230;</button>
                </div>
            </div>
            <div id="tops">
                <p class="category-label">Top</p>
                <img class="topsimg" src="" alt="tops">
                <div id="next1btn">
                <button id="left1">&#10229;</button>
                <button id="right1">&#10230;</button>
                </div>
            </div>
            <div id="bottoms">
                <p class="category-label">Bottom</p>
                <img class="bottomimg" src="" alt="bottoms">
                <div id="next2btn">
                <button id="left2">&#10229;</button>
                <button id="right2">&#10230;</button>
                </div>
            </div>
            <div id="shoes">
                <p class="category-label">Shoes</p>
                <img class="shoesimg" src="" alt="shoes">
                <div id="next3btn">
                <button id="left3">&#10229;</button>
                <button id="right3">&#10230;</button>
                </div>
            </div>
        </div>
    </body>
</html>
